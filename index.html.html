<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Architecture Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:
linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),
url("elouda.jpg") center/cover no-repeat;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-radius:22px;
padding:50px 50px;

width:420px;

text-align:center;

border:1px solid rgba(255,255,255,0.35);
outline:1px solid rgba(255,255,255,0.1);

box-shadow:0 20px 60px rgba(0,0,0,0.35);

animation:fadeIn 1s ease;
}

h1{
letter-spacing:3px;
margin-bottom:50px;
margin-top:10px;
color:#ffffff !important;
}

.button{
display:flex;
align-items:center;
justify-content:center;
gap:12px;

width:100%;
box-sizing:border-box;

margin:8px 0;
padding:12px 20px;

border-radius:25px;
text-decoration:none;
font-size:16px;
color:white;
border:1px solid rgba(255,255,255,0.6);
transition:0.3s;
}

opacity:0;
animation:slideUp 0.6s forwards;
}

.button:nth-child(2){animation-delay:0.2s;}
.button:nth-child(3){animation-delay:0.3s;}
.button:nth-child(4){animation-delay:0.4s;}
.button:nth-child(5){animation-delay:0.5s;}
.button:nth-child(6){animation-delay:0.6s;}
.button:nth-child(7){animation-delay:0.7s;}

.button:hover{
background:white;
color:black;
}

.logo{
width:200px;
margin-top:35px;
filter:brightness(0) invert(1);
animation:logoFade 2s ease;
}

/* animations */

@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

@keyframes slideUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes logoFade{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="card">

<h1>DISCOVER OUR WORK</h1>

<a class="button" href="https://www.tsikandilakis.gr">
<i class="fa-solid fa-globe"></i> Website
</a>

<a class="button" href="https://www.instagram.com/lefteristsikandilakis_arch/">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="button" href="https://www.linkedin.com/company/69811370/admin/dashboard/">
<i class="fa-brands fa-linkedin"></i> LinkedIn
</a>

<a class="button" href="https://gr.pinterest.com/lefteristsikandilakis/">
<i class="fa-brands fa-pinterest"></i> Pinterest
</a>

<a class="button" href="https://www.facebook.com/Tsikandilakis.Lefteris.Architecture">
<i class="fa-brands fa-facebook"></i> Facebook
</a>

<a class="button" href="https://www.tiktok.com/@tsikandilakis_architects">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<img src="logoblack.png" class="logo">

</div>

</body>
</html>
